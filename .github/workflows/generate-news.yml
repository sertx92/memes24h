name: Generate Daily News

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch:       # Manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate news
        env:
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          OPENSEA_KEY: ${{ secrets.OPENSEA_KEY }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/generate-news.py

      - name: Update hardcoded fallback in HTML
        run: python .github/scripts/update-fallback.py

      - name: Commit updated news
        run: |
          git config user.name "MEMES24H Bot"
          git config user.email "bot@memes24h.xyz"
          git add data/news-latest.json index.html
          git diff --staged --quiet || git commit -m "News update: $(date -u +%Y-%m-%d_%H:%M)"
          git push || echo "Nothing to push"
