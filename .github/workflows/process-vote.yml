name: Process Vote/Proposal

on:
  issues:
    types: [opened]

jobs:
  process:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'vote') || contains(github.event.issue.labels.*.name, 'proposal')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install ethers@6

      - name: Validate and process
        id: validate
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: node .github/scripts/validate.js

      - name: Commit result
        if: success()
        run: |
          git config user.name "MEMES24H Bot"
          git config user.email "bot@memes24h.xyz"
          git add data/
          git commit -m "Process: ${{ github.event.issue.title }}" || echo "No changes"
          git push

      - name: Close issue (success)
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Validated and processed successfully.'
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              labels: ['processed']
            });

      - name: Close issue (failure)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Validation failed. Check the Action logs for details.'
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              labels: ['rejected']
            });
